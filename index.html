<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>NOIR MARKET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.iconify.design">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=1">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">

    <!-- Шапка -->
    <header id="topbar">
      <div class="brand">
        <div class="brand-mark" id="brandMark"></div>
        <div class="brand-text">
          <div class="brand-name" id="brandName">NOIR MARKET</div>
          <div class="brand-tag" id="brandTag">цифровые товары</div>
        </div>
      </div>
      <button class="topbar-btn" id="searchBtn" aria-label="Поиск"></button>
    </header>

    <!-- Бегущая строка -->
    <div id="marquee" class="marquee">
      <div class="marquee-track" id="marqueeTrack"></div>
    </div>

    <!-- Поиск -->
    <div id="searchBar" class="search-bar hidden">
      <div class="search-inner">
        <span id="searchIcon"></span>
        <input type="text" id="searchInput" placeholder="Поиск товаров…" autocomplete="off">
        <button id="searchClear" class="search-clear hidden">✕</button>
      </div>
    </div>

    <!-- Экраны -->
    <main id="views">
      <section id="view-home" class="view active"></section>
      <section id="view-cart" class="view"></section>
      <section id="view-profile" class="view"></section>
      <section id="view-admin" class="view"></section>
    </main>

    <!-- Нижняя навигация -->
    <nav id="bottomnav"></nav>

    <!-- Шторки / модалки -->
    <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>
    <div id="sheet" class="sheet hidden">
      <div class="sheet-grip"></div>
      <div id="sheet-content" class="sheet-content"></div>
    </div>

    <!-- Тосты -->
    <div id="toasts"></div>

    <!-- Экран загрузки -->
    <div id="splash">
      <div class="splash-logo">NOIR<span>▪</span>MARKET</div>
      <div class="splash-bar"><i></i></div>
    </div>

    <!-- Экран блокировки / ошибки -->
    <div id="fatal" class="hidden">
      <div class="fatal-icon" id="fatalIcon"></div>
      <div class="fatal-title" id="fatalTitle"></div>
      <div class="fatal-text" id="fatalText"></div>
    </div>
  </div>

  <script src="js/icons.js?v=1"></script>
  <script src="js/api.js?v=1"></script>
  <script src="js/app.js?v=1"></script>
  <script src="js/admin.js?v=1"></script>
</body>
</html>
